<svg xmlns="http://www.w3.org/2000/svg" width="800" height="533" viewBox="0 0 800 533">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="533" fill="url(#bg-gradient)"/>

  <!-- 装饰圆 -->
  <circle cx="650" cy="100" r="150" fill="#a855f7" opacity="0.1"/>
  <circle cx="700" cy="450" r="120" fill="#ec4899" opacity="0.08"/>

  <!-- 文档图标 -->
  <g transform="translate(320, 120)">
    <!-- 文档主体 -->
    <rect x="0" y="0" width="160" height="200" rx="8" fill="#ffffff" opacity="0.95"/>
    <!-- 文档头部线条 -->
    <rect x="20" y="20" width="80" height="8" rx="4" fill="#e5e7eb"/>
    <rect x="20" y="40" width="120" height="6" rx="3" fill="#d1d5db"/>
    <rect x="20" y="56" width="100" height="6" rx="3" fill="#d1d5db"/>
    <!-- 文档内容线条 -->
    <rect x="20" y="80" width="120" height="4" rx="2" fill="#e5e7eb"/>
    <rect x="20" y="92" width="100" height="4" rx="2" fill="#e5e7eb"/>
    <rect x="20" y="104" width="110" height="4" rx="2" fill="#e5e7eb"/>
    <rect x="20" y="120" width="120" height="4" rx="2" fill="#e5e7eb"/>
    <rect x="20" y="132" width="90" height="4" rx="2" fill="#e5e7eb"/>
    <rect x="20" y="148" width="100" height="4" rx="2" fill="#e5e7eb"/>
    <rect x="20" y="160" width="115" height="4" rx="2" fill="#e5e7eb"/>
    <!-- 文档角落折叠 -->
    <path d="M120 0 L160 0 L160 40 Z" fill="#f3f4f6"/>
    <path d="M120 0 L120 40 L160 40 Z" fill="#e5e7eb"/>
  </g>

  <!-- 标签 -->
  <rect x="280" y="340" width="240" height="36" rx="18" fill="url(#accent-gradient)"/>
  <text x="400" y="364" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">产品需求文档</text>

  <!-- 标题 -->
  <text x="400" y="420" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700" fill="#ffffff" text-anchor="middle">筛选错题组卷导出</text>

  <!-- 副标题 -->
  <text x="400" y="460" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#9ca3af" text-anchor="middle">AI斩书 · PRD文档</text>
</svg>
